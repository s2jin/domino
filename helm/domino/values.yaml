# Default values for installing Domino in a K8s cluster

github_access_token_pieces: default-substitute-this-for-your-own-token
github_access_token_workflows: default-substitute-this-for-your-own-token

# Frontend service
frontend:
  enabled: true
  image: ghcr.io/tauffer-consulting/domino-frontend
  tag: latest
  apiUrl: http://localhost/api

# REST service
rest:
  enabled: true
  image: ghcr.io/tauffer-consulting/domino-rest
  tag: latest
  deployMode: local-k8s # TODO change to prod
  airflowWebserverHost: http://airflow-api-server:8080
  # Git API base URL - set for Gitea/GitLab (e.g. http://gitea-http.gitea.svc.cluster.local:3000/api/v1)
  gitApiBaseUrl: ""
  # Workflows repository name - Same one used in airflow gitSync
  workflowsRepository: ~
  createDefaultUser: true

# Ingress
ingress:
  host: ""

# Change this if using external Database
database:
  enabled: true
  image: postgres:13
  name: postgres
  user: postgres
  password: postgres
  port: "5432"
